name: Deploy AMT widget

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      # npm lockfiles created on macOS can omit Rollup's Linux optional binary.
      # Resolve the runner-native optional dependencies without rewriting the lockfile.
      - run: npm install --no-package-lock
      - name: Build production bundle
        shell: bash
        run: |
          set +e
          output="$(npm run build:web 2>&1)"
          status=$?
          echo "$output"
          if [ "$status" -ne 0 ]; then
            message="$(echo "$output" | tail -n 30 | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/::/%3A%3A/g')"
            echo "::error file=package.json,line=1,title=Vite build failed::$message"
            exit "$status"
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
